<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<rect x="0.5" y="0.5" width="1199" height="759" fill="#ffffff" stroke="#333333" stroke-width="1"/>
<rect x="0.5" y="0.5" width="1199" height="44" fill="#ffffff" stroke="#000000" stroke-width="1.4"/>
<text x="600" y="28" text-anchor="middle" font-size="17" font-weight="800" fill="#000000">Which client conditions actually bind the numbers?</text>
<text x="40" y="70" text-anchor="start" font-size="13" font-weight="400" fill="#000000"><tspan x="40" dy="0.0">A client&#x27;s tactical instructions vary endlessly, but their SHAPE falls into just three handling tiers. The copilot classifies each ask and is honest</tspan><tspan x="40" dy="16.6">about what it can enforce today — it never pretends an instruction is binding when it is only a note.</tspan></text>
<rect x="40" y="108" width="366" height="150" fill="#ffffff" stroke="#000000" stroke-width="1.4" rx="6"/>
<rect x="40" y="108" width="366" height="4" fill="#000000"/>
<text x="56" y="138" font-size="15" font-weight="800" fill="#000000">ENFORCED</text>
<text x="56" y="157" font-size="11" font-weight="700" fill="#333333" letter-spacing="0.5">BINDS A COMPUTED NUMBER</text>
<text x="56" y="178" text-anchor="start" font-size="12" font-weight="400" fill="#000000"><tspan x="56" dy="0.0">Checked against real data and allowed to gate a</tspan><tspan x="56" dy="15.4">trade — a target weight (via Apply), or an</tspan><tspan x="56" dy="15.4">absolute price level on a priceable instrument.</tspan></text>
<text x="56" y="244" font-size="11.5" font-family="Consolas, monospace" fill="#333333">e.g.  “buy gold below $4,000/oz”</text>
<rect x="427" y="108" width="366" height="150" fill="#ffffff" stroke="#000000" stroke-width="1.4" rx="6"/>
<rect x="427" y="108" width="366" height="4" fill="#000000"/>
<text x="443" y="138" font-size="15" font-weight="800" fill="#000000">MONITORED</text>
<text x="443" y="157" font-size="11" font-weight="700" fill="#333333" letter-spacing="0.5">WATCHED, NOT YET BINDING</text>
<text x="443" y="178" text-anchor="start" font-size="12" font-weight="400" fill="#000000"><tspan x="443" dy="0.0">On the watchlist and flagged when hit, but can&#x27;t</tspan><tspan x="443" dy="15.4">gate the math yet — typically a relative move</tspan><tspan x="443" dy="15.4">that needs a defined reference point.</tspan></text>
<text x="443" y="244" font-size="11.5" font-family="Consolas, monospace" fill="#333333">e.g.  “add after a 15–20% pullback”</text>
<rect x="814" y="108" width="366" height="150" fill="#ffffff" stroke="#000000" stroke-width="1.4" rx="6"/>
<rect x="814" y="108" width="366" height="4" fill="#000000"/>
<text x="830" y="138" font-size="15" font-weight="800" fill="#000000">ADVISORY</text>
<text x="830" y="157" font-size="11" font-weight="700" fill="#333333" letter-spacing="0.5">SHAPES THE WRITE-UP ONLY</text>
<text x="830" y="178" text-anchor="start" font-size="12" font-weight="400" fill="#000000"><tspan x="830" dy="0.0">Folds into the narrative and deck notes —</tspan><tspan x="830" dy="15.4">execution style, selection, questions, research</tspan><tspan x="830" dy="15.4">context. Never touches a figure.</tspan></text>
<text x="830" y="244" font-size="11.5" font-family="Consolas, monospace" fill="#333333">e.g.  “buy in tranches”, “low fees”</text>
<text x="40" y="300" font-size="12.5" font-weight="800" fill="#000000" letter-spacing="1.5">THE CLIENT’S ACTUAL MESSAGE, TIER BY TIER</text>
<rect x="36" y="314" width="1128" height="30" fill="#000000"/>
<text x="48" y="334" font-size="12" font-weight="700" fill="#ffffff">The client’s words</text>
<text x="368" y="334" font-size="12" font-weight="700" fill="#ffffff">Shape</text>
<text x="518" y="334" font-size="12" font-weight="700" fill="#ffffff">Tier today</text>
<text x="668" y="334" font-size="12" font-weight="700" fill="#ffffff">What the copilot does</text>
<rect x="36" y="344" width="1128" height="54" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
<text x="48" y="364" text-anchor="start" font-size="12" font-weight="700" fill="#000000"><tspan x="48" dy="0.0">MMF 10% · Gold 20% · Bond 20% · Nasdaq 20% ·</tspan><tspan x="48" dy="15.4">S&amp;P 30%</tspan></text>
<text x="368" y="364" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="368" dy="0.0">allocation target</tspan></text>
<text x="518" y="364" font-size="11.5" font-weight="800" fill="#000000">ENFORCED (Apply)</text>
<text x="668" y="364" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="668" dy="0.0">Flows through Apply → the numeric targets; drives drift &amp; the rebalance.</tspan></text>
<rect x="36" y="398" width="1128" height="54" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
<text x="48" y="418" text-anchor="start" font-size="12" font-weight="700" fill="#000000"><tspan x="48" dy="0.0">“buy gold below $4,000/oz”</tspan></text>
<text x="368" y="418" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="368" dy="0.0">absolute price trigger</tspan></text>
<text x="518" y="418" font-size="11.5" font-weight="800" fill="#000000">ENFORCED</text>
<text x="668" y="418" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="668" dy="0.0">Checks live gold vs $4,000 → gates the commodity buy (buy above the level</tspan><tspan x="668" dy="14.7">→ HOLD), with provenance.</tspan></text>
<rect x="36" y="452" width="1128" height="54" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
<text x="48" y="472" text-anchor="start" font-size="12" font-weight="700" fill="#000000"><tspan x="48" dy="0.0">“add after a 15–20% pullback”</tspan></text>
<text x="368" y="472" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="368" dy="0.0">relative price trigger</tspan></text>
<text x="518" y="472" font-size="11.5" font-weight="800" fill="#000000">MONITORED</text>
<text x="668" y="472" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="668" dy="0.0">Watchlisted and flagged when hit — does not gate a trade yet (needs a</tspan><tspan x="668" dy="14.7">trailing-high reference).</tspan></text>
<rect x="36" y="506" width="1128" height="54" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
<text x="48" y="526" text-anchor="start" font-size="12" font-weight="700" fill="#000000"><tspan x="48" dy="0.0">“buy the bond fund in tranches”</tspan></text>
<text x="368" y="526" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="368" dy="0.0">execution style</tspan></text>
<text x="518" y="526" font-size="11.5" font-weight="800" fill="#000000">ADVISORY</text>
<text x="668" y="526" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="668" dy="0.0">Annotates the fixed-income buy row (“execute in tranches”); prints in</tspan><tspan x="668" dy="14.7">guidance.</tspan></text>
<rect x="36" y="560" width="1128" height="54" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
<text x="48" y="580" text-anchor="start" font-size="12" font-weight="700" fill="#000000"><tspan x="48" dy="0.0">“low fees, good liquidity”</tspan></text>
<text x="368" y="580" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="368" dy="0.0">selection screen</tspan></text>
<text x="518" y="580" font-size="11.5" font-weight="800" fill="#000000">ADVISORY</text>
<text x="668" y="580" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="668" dy="0.0">Narrative guidance only — would need an instrument fee/liquidity dataset</tspan><tspan x="668" dy="14.7">to bind.</tspan></text>
<rect x="36" y="614" width="1128" height="38" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
<text x="48" y="634" text-anchor="start" font-size="12" font-weight="700" fill="#000000"><tspan x="48" dy="0.0">“concerned about rate hikes”</tspan></text>
<text x="368" y="634" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="368" dy="0.0">macro intent</tspan></text>
<text x="518" y="634" font-size="11.5" font-weight="800" fill="#000000">ADVISORY</text>
<text x="668" y="634" text-anchor="start" font-size="11.5" font-weight="400" fill="#000000"><tspan x="668" dy="0.0">Shapes the CIO commentary tone — a viewpoint, never a figure.</tspan></text>
<rect x="36" y="668" width="1128" height="64" fill="#000000" rx="5"/>
<text x="52" y="692" font-size="11.5" font-weight="800" fill="#ffffff" letter-spacing="1">THE GUARDRAIL — TIERED, NOT ABSOLUTE</text>
<text x="52" y="712" font-size="11.5" font-weight="400" fill="#ffffff"><tspan x="52" dy="0.0">The copilot still never invents a number. An enforced condition can gate or flag a trade — using a figure sourced with provenance — but</tspan><tspan x="52" dy="14.7">never fabricate one. Advisory and monitored items shape the words and the watchlist, never the maths.</tspan></text>
</svg>